syntax = "proto3";

package anttrader.mthub.v1;

option go_package = "anttrader/gen/proto/anttrader/mthub/v1;mthubv1";

// ── Session ──

message EnsureSessionRequest {
  string account_id = 1;
}

message EnsureSessionResponse {
  string session_id = 1;
  bool already_active = 2;
}

message CloseSessionRequest {
  string account_id = 1;
}

message CloseSessionResponse {}

// ── Order ──

message OrderSendRequest {
  string account_id = 1;
  string symbol = 2;
  string side = 3;     // "buy" | "sell"
  double volume = 4;
  double price = 5;    // 0 for market
  double sl = 6;
  double tp = 7;
  string comment = 8;
  string type = 9;     // "market" | "limit" | "stop"
}

message OrderSendResponse {
  int64 ticket = 1;
  string error = 2;
}

message OrderCloseRequest {
  string account_id = 1;
  int64 ticket = 2;
  double lots = 3;
}

message OrderCloseResponse {
  string error = 1;
}

message OrderHistoryRequest {
  string account_id = 1;
  string from = 2;     // ISO datetime
  string to = 3;       // ISO datetime
}

message OrderRecord {
  int64 ticket = 1;
  string symbol = 2;
  string side = 3;
  double lots = 4;
  double open_price = 5;
  double close_price = 6;
  double profit = 7;
  double swap = 8;
  double commission = 9;
  string open_time = 10;
  string close_time = 11;
  string state = 12;
  int64 open_time_ms = 13;
  double current_price = 14;
}

message OrderHistoryResponse {
  repeated OrderRecord orders = 1;
}

message OpenedOrdersRequest {
  string account_id = 1;
}

message OpenedOrdersResponse {
  repeated OrderRecord orders = 1;
}

// ── Symbol ──

message SymbolParam {
  string symbol = 1;
  int32 digits = 2;
  double point = 3;
  double contract_size = 4;
  double min_lot = 5;
  double max_lot = 6;
  double lot_step = 7;
}

message SymbolParamsManyRequest {
  string account_id = 1;
  repeated string symbols = 2;
}

message SymbolParamsManyResponse {
  repeated SymbolParam params = 1;
}

// ── Price ──

message PriceBar {
  int64 open_ts_ms = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  double volume = 6;
}

message PriceHistoryRequest {
  string account_id = 1;
  string symbol = 2;
}

message PriceHistoryResponse {
  repeated PriceBar bars = 1;
}

// ── Stream ──

message OrderEvent {
  string account_id = 1;
  string type = 2;
  OrderRecord order = 3;
}

message SubscribeOrderEventsRequest {
  string account_id = 1;
}

// ── Service ──

service MtHubService {
  // Session management
  rpc EnsureSession(EnsureSessionRequest) returns (EnsureSessionResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);

  // Order operations
  rpc OrderSend(OrderSendRequest) returns (OrderSendResponse);
  rpc OrderClose(OrderCloseRequest) returns (OrderCloseResponse);
  rpc OrderHistory(OrderHistoryRequest) returns (OrderHistoryResponse);
  rpc OpenedOrders(OpenedOrdersRequest) returns (OpenedOrdersResponse);

  // Symbol & price queries
  rpc SymbolParamsMany(SymbolParamsManyRequest) returns (SymbolParamsManyResponse);
  rpc PriceHistory(PriceHistoryRequest) returns (PriceHistoryResponse);

  // Streaming
  rpc SubscribeOrderEvents(SubscribeOrderEventsRequest) returns (stream OrderEvent);
}
