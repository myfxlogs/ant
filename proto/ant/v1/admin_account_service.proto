syntax = "proto3";
package ant.v1;
option go_package = "anttrader/gen/proto/ant/v1;antv1";
import "google/protobuf/empty.proto";
import "admin_account.proto";
service AdminAccountService {
  rpc ListAccountsAdmin(ListAccountsAdminRequest) returns (ListAccountsAdminResponse);
  rpc GetAccountAdmin(GetAccountAdminRequest) returns (AccountWithUser);
  rpc FreezeAccount(FreezeAccountRequest) returns (google.protobuf.Empty);
  rpc UnfreezeAccount(UnfreezeAccountRequest) returns (google.protobuf.Empty);
}
