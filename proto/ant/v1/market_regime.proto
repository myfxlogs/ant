syntax = "proto3";

package ant.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "anttrader/gen/proto/ant/v1;antv1";

service MarketRegimeService {
  rpc DetectMarketRegime(DetectMarketRegimeRequest) returns (MarketRegime);
  rpc GetMarketRegime(GetMarketRegimeRequest) returns (MarketRegime);
}

message MarketRegime {
  string id = 1;
  string account_id = 2;
  string symbol = 3;
  string timeframe = 4;
  string regime = 5;
  double confidence = 6;
  google.protobuf.Struct features = 7;
  repeated MarketRegimeSegment segments = 8;
  repeated string strategy_families = 9;
  google.protobuf.Timestamp from = 10;
  google.protobuf.Timestamp to = 11;
  string model_version = 12;
  google.protobuf.Timestamp created_at = 13;
}

message MarketRegimeSegment {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
  string regime = 3;
  double confidence = 4;
}

message DetectMarketRegimeRequest {
  string account_id = 1;
  string symbol = 2;
  string timeframe = 3;
  google.protobuf.Timestamp from = 4;
  google.protobuf.Timestamp to = 5;
  int32 count = 6;
}

message GetMarketRegimeRequest {
  string regime_id = 1;
}
