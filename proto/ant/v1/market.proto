syntax = "proto3";

package ant.v1;

option go_package = "anttrader/gen/proto/ant/v1;antv1";

import public "market_quote.proto";
import public "market_symbol.proto";
import public "market_kline.proto";
import public "market_watch.proto";

service MarketService {
  rpc GetQuote(GetQuoteRequest) returns (Quote);
  rpc GetQuotes(GetQuotesRequest) returns (GetQuotesResponse);
  rpc GetSymbols(GetSymbolsRequest) returns (GetSymbolsResponse);
  rpc GetSymbolParams(GetSymbolParamsRequest) returns (SymbolParamsResponse);
  rpc GetKlines(GetKlinesRequest) returns (GetKlinesResponse);
  rpc GetMarketWatch(GetMarketWatchRequest) returns (GetMarketWatchResponse);
}
