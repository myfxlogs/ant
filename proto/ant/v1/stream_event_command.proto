syntax = "proto3";

package ant.v1;

option go_package = "anttrader/gen/proto/ant/v1;antv1";

message TradeCommandEvent { string request_id = 1; string idempotency_key = 2; string operation = 3; string account_id = 10; string symbol = 11; string payload_json = 20; }
message TradeReceiptEvent { string request_id = 1; string idempotency_key = 2; string operation = 3; string account_id = 10; int32 retcode = 20; string message = 21; string error = 22; int64 ticket = 30; }
