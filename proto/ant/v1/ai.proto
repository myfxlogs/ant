syntax = "proto3";

package ant.v1;

option go_package = "anttrader/gen/proto/ant/v1;antv1";

import public "ai_chat.proto";
import public "ai_agent.proto";

service AIService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  // Server-streaming assistant reply; see docs/AI对话体验与可靠性优化.md
  rpc ChatStream(ChatRequest) returns (stream ChatStreamChunk);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  rpc UpdateConversationTitle(UpdateConversationTitleRequest) returns (UpdateConversationTitleResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
}
