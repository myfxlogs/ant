syntax = "proto3";
package ant.v1;
option go_package = "anttrader/gen/proto/ant/v1;antv1";
message ListConfigsResponse { repeated SystemConfig configs = 1; }
message GetConfigRequest { string key = 1; }
message SystemConfig { string key = 1; string value = 2; string description = 3; bool enabled = 4; }
message SetConfigRequest { string key = 1; string value = 2; string description = 3; }
message ToggleConfigEnabledRequest { string key = 1; bool enabled = 2; }
