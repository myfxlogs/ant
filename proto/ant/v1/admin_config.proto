syntax = "proto3";

package ant.v1;

import "google/protobuf/timestamp.proto";

option go_package = "anttrader/gen/proto/ant/v1;antv1";

service AdminConfigService {
  rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);
  rpc SetConfig(SetConfigRequest) returns (SetConfigResponse);
  rpc ToggleConfigEnabled(ToggleConfigEnabledRequest) returns (ToggleConfigEnabledResponse);
}

message SystemConfig {
  string key = 1;
  string value = 2;
  string description = 3;
  bool enabled = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message ListConfigsRequest {}

message ListConfigsResponse {
  repeated SystemConfig configs = 1;
}

message SetConfigRequest {
  string key = 1;
  string value = 2;
  string description = 3;
}

message SetConfigResponse {}

message ToggleConfigEnabledRequest {
  string key = 1;
  bool enabled = 2;
}

message ToggleConfigEnabledResponse {}
