syntax = "proto3";

package ant.v1;

import "google/protobuf/timestamp.proto";

option go_package = "anttrader/gen/proto/ant/v1;antv1";

service AdminLogService {
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse);
}

message AdminLog {
  string id = 1;
  string admin_id = 2;
  string module = 3;
  string action_type = 4;
  string target_type = 5;
  string target_id = 6;
  string ip_address = 7;
  string user_agent = 8;
  string request_method = 9;
  string request_path = 10;
  bool success = 11;
  string error_message = 12;
  google.protobuf.Timestamp created_at = 13;
}

message ListLogsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string module = 3;
  string action_type = 4;
  string start_date = 5;
  string end_date = 6;
  string admin_id = 7;
}

message ListLogsResponse {
  repeated AdminLog logs = 1;
  int64 total = 2;
}
