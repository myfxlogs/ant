version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      go-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - go

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      npm-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - frontend

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /strategy-service
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - docker
