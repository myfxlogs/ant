name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── M0.1-3: line limits ──
  line-limits:
    name: Line limits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check source and generated line limits
        run: python3 scripts/check-file-lines.py

  # ── M0.1-3: backend lint ──
  backend-lint:
    name: Backend (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: backend
          args: --timeout=5m --out-format=colored-line-number --new-from-rev=origin/main

  # ── M0.1-3: backend test + build ──
  backend-test:
    name: Backend (test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ant
          POSTGRES_PASSWORD: ant_test
          POSTGRES_DB: ant
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ant -d ant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go test
        run: go test ./... -count=1 -race -short -coverprofile=coverage.out -covermode=atomic
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ant
          DB_PASSWORD: ant_test
          DB_NAME: ant
      - name: Coverage summary
        run: |
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -1
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Overall coverage: ${COV}%"
      - name: Coverage gate (≥60%)
        run: |
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          THRESHOLD=60
          if awk "BEGIN {exit !($COV < $THRESHOLD)}"; then
            echo "::error::Coverage ${COV}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COV}% ≥ ${THRESHOLD}% — PASS"
      - name: go build
        run: go build ./...
      - name: go build cmd/server
        run: go build -o /dev/null ./cmd/server

  # ── M0.1-3: proto breaking ──
  proto-breaking:
    name: Proto (buf breaking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.50.0'
      - uses: bufbuild/buf-lint-action@v1
      - name: buf breaking
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'

  # ── M0.1-3: proto drift ──
  proto-drift:
    name: Proto (codegen drift)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install proto toolchain
        run: make proto-tools
      - name: Regenerate protobuf
        run: make proto
      - name: Assert no uncommitted changes after codegen
        run: |
          if [ -n "$(git status --porcelain=v1)" ]; then
            echo "::error::Working tree dirty after buf generate — commit updated gen or align toolchain."
            git status
            git diff
            exit 1
          fi

  # ── M0.1-5: migration .down check ──
  migration-down-check:
    name: Migrations (down check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR-added .up.sql have matching .down.sql
        run: |
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "HEAD~1")
          FAIL=0
          for f in $(git diff --name-only --diff-filter=A "$BASE"...HEAD -- 'backend/migrations/*.up.sql' 2>/dev/null); do
            down="${f%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "::error::PR adds $f but missing $down"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo "::error::Every .up.sql added in this PR must have a matching .down.sql"
            exit 1
          fi
          echo "All PR-added .up.sql files have matching .down.sql ✅"

  # ── M0.1-3: frontend ──
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (incremental — only changed files)
        run: |
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "HEAD~1")
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE"...HEAD -- 'frontend/src/**/*.{ts,tsx}' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No TS/TSX files changed — skipping lint"
          else
            echo "Linting changed files:"
            echo "$FILES"
            npx eslint $FILES
          fi
      - name: Build
        run: npm run build

  # ── P2-3: verify-cards-strict + R0 five-piece ──
  verify-cards-strict:
    name: Card verification (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: R0 five-piece suite
        run: make detect-all
      - name: verify-cards-strict (M11)
        run: make verify-cards-strict MILESTONE=M11
