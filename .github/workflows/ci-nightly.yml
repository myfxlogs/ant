name: CI Nightly

on:
  schedule:
    - cron: '37 2 * * *'
  workflow_dispatch:

jobs:
  # ── Full test + coverage (no -short) ──
  nightly-test:
    name: Full test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ant
          POSTGRES_PASSWORD: ant_test
          POSTGRES_DB: ant
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ant -d ant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports: ['9000:9000', '8123:8123']
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: ant
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports: ['4222:4222']
        options: >-
          --health-cmd "nats server check connection"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go test (full)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
      - name: go test (integration)
        run: go test ./... -count=1 -tags=integration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ant
          DB_PASSWORD: ant_test
          DB_NAME: ant
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CH_HOST: localhost
          CH_PORT: 9000
          CH_USER: default
          CH_PASSWORD: ''
          CH_DATABASE: ant
          NATS_URL: nats://localhost:4222
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ant
          DB_PASSWORD: ant_test
          DB_NAME: ant
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CH_HOST: localhost
          CH_PORT: 9000
          CH_USER: default
          CH_PASSWORD: ''
          CH_DATABASE: ant
          NATS_URL: nats://localhost:4222
      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          THRESHOLD=60
          if awk "BEGIN {exit !($COV < $THRESHOLD)}"; then
            echo "::warning::Nightly coverage ${COV}% is below threshold ${THRESHOLD}%"
          else
            echo "Nightly coverage ${COV}% ≥ ${THRESHOLD}% — PASS"
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: nightly
          fail_ci_if_error: false

  # ── Data foundation checks ──
  nightly-data-check:
    name: Data foundation (md-doctor + slo-report)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports: ['9000:9000', '8123:8123']
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: ant
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2.10-alpine
        ports: ['4222:4222']
        options: >-
          --health-cmd "nats server check connection"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: ci-nightly
        run: make ci-nightly
        env:
          CH_HOST: localhost
          CH_PORT: 9000
          CH_USER: default
          CH_PASSWORD: ''
          CH_DATABASE: ant
          NATS_URL: nats://localhost:4222
