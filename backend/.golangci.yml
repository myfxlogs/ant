# golangci-lint configuration for ant backend
# M0.3: complexity limits + baseline waiver strategy
#
# CI usage:
#   golangci-lint run --new-from-rev=origin/main   # only check changed code
#   golangci-lint run ./...                          # full check (baseline in tools/lint/)
#
# Baseline: tools/lint/baseline.json freezes existing 281 violations.
# Any PR touching a baseline-listed file must reduce it below the limit,
# or CI will fail.

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - funlen
    - gocognit
    - gosec
    - bodyclose
    - noctx
    - goconst
    - unconvert
    - unparam
    - misspell
    - forbidigo

linters-settings:
  forbidigo:
    # M10-BASE-A5: Clock abstraction — ban raw time calls.
    # Only clock package, main, and _test files are exempt.
    forbid:
      - p: ^time\.Now$
        msg: "use clock.Now() instead of time.Now() (M10-BASE-A5)"
      - p: ^time\.Sleep$
        msg: "use clock.Sleep() instead of time.Sleep() (M10-BASE-A5)"
      - p: ^time\.NewTicker$
        msg: "use clock.NewTicker() instead of time.NewTicker() (M10-BASE-A5)"
      - p: ^time\.NewTimer$
        msg: "use clock.NewTimer() instead of time.NewTimer() (M10-BASE-A5)"
      - p: ^time\.AfterFunc$
        msg: "use clock.AfterFunc() instead of time.AfterFunc() (M10-BASE-A5)"
    exclude-godoc-examples: false
  revive:
    rules:
      - name: argument-limit
        severity: warning
        arguments: [5]

  gocyclo:
    min-complexity: 11  # Red at >10 (matching AGENT.md §复杂度硬上限)

  funlen:
    lines: 50      # Red at >50 lines per function
    statements: 40

  gocognit:
    min-complexity: 11

issues:
  exclude-dirs:
    # Tier 3 permanent exemptions (M0.3-5)
    - backend/gen
    - backend/mt4
    - backend/mt5
    - frontend

  exclude-files:
    # Proto generated code
    - ".*\\.pb\\.go$"
    - ".*_grpc\\.pb\\.go$"
    # Constants / defaults
    - ".*const.*\\.go$"

  exclude-rules:
    # Allow long files for well-known patterns in existing code
    # (CI enforces: --new-from-rev to only gate new/changed code)
    - path: "backend/internal/model/models\\.go"
      linters: [funlen]

    # M10-BASE-A5: Clock abstraction — allow time.* calls in clock pkg, main, tests.
    - path: "internal/clock/"
      linters: [forbidigo]
    - path: "cmd/"
      linters: [forbidigo]
    - path: "_test\\.go$"
      linters: [forbidigo]
