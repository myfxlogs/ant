version: v2
inputs:
  - directory: proto/ant/v1
clean: false
plugins:
  - local: protoc-gen-go
    out: backend/gen/proto/ant/v1
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: backend/gen/proto/ant/v1
    opt:
      - paths=source_relative
  - local: protoc-gen-es
    out: frontend/src/gen/ant/v1
    opt: target=ts
