version: v2
deps: []
modules:
  - path: proto/ant/v1
    name: buf.build/ant/api
# mt4/mt5 are third-party protos from mtapi.io — pre-generated .go in backend/mt4,mt5/
# No .proto sources available locally; excluded from buf lint
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - IMPORT_NO_PUBLIC
breaking:
  except:
    - EXTENSION_NO_DELETE
    - FIELD_SAME_DEFAULT
