syntax = "proto3";
package mt5grpc;
option go_package = "git.mtapi.io/root/grpc-proto.git/mt5/go";
import "google/protobuf/timestamp.proto";

service Connection {
// Connect to account with user, password, host, port.
// [Example] 
// { 
//  "user": "21455", 
//  "password": "1nJeS+Ae", 
//  "host": "95.217.147.61", 
//  "port": "443" 
// }
  rpc Connect (ConnectRequest) returns (ConnectReply);
// [Example] 
// { 
//  "user": "213827411", 
//  "password": "_rVx1tMn", 
//  "server": "OctaFX-Demo", 
// }
  rpc ConnectEx (ConnectExRequest) returns (ConnectExReply);

// Connect to account with user, password, host, port.
// [Example] 
// { 
//  "user": "21455", 
//  "password": "1nJeS+Ae", 
//  "host": "95.217.147.61", 
//  "port": "443", 
//  "proxyUser": "ProxyUser123", 
//  "proxyPassword": "qwerty123", 
//  "proxyHost": "65.108.126.217", 
//  "proxyPort": "1080", 
//  "proxyType": "Socks5" 
// }
  rpc ConnectProxy (ConnectProxyRequest) returns (ConnectProxyReply);
// Check connection state and reconnect if connection lost
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc CheckConnect (CheckConnectRequest) returns (CheckConnectReply);
// Disconnect from account
// [Example] 
// { 
//  "id": "" 
// }
  rpc Disconnect (DisconnectRequest) returns (DisconnectReply);
}

service MT5 {
// Accound details
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc Account (AccountRequest) returns (AccountReply);
// Balance, Equity, Currency, FreeMargin, Margin, MarginLevel, Profit, Leverage, Credit
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc AccountSummary (AccountSummaryRequest) returns (AccountSummaryReply);
// List of opened orders
// [Example] 
// { 
//  "id": "", 
//  "sort": "OpenTime", 
//  "ascending": "True" 
// }
  rpc OpenedOrders (OpenedOrdersRequest) returns (OpenedOrdersReply);
// List of opened orders
// [Example] 
// { 
//  "id": "", 
//  "ticket": "" 
// }
  rpc OpenedOrder (OpenedOrderRequest) returns (OpenedOrderReply);
// Just tickets of opened orders
// [Example] 
// { 
//  "id": "demo-token-mt4" 
// }
  rpc OpenedOrdersTickets (OpenedOrdersTicketsRequest) returns (OpenedOrdersTicketsReply);
// Order history
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "from": "2022-01-01T00:00:00", 
//  "to": "2022-09-01T00:00:00", 
//  "sort": "OpenTime", 
//  "ascending": "True" 
// }
  rpc OrderHistory (OrderHistoryRequest) returns (OrderHistoryReply);
// Pending order history
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "from": "2023-09-01T00:00:00", 
//  "to": "2023-10-01T00:00:00", 
//  "ascending": "True" 
// }
  rpc PendingOrderHistory (PendingOrderHistoryRequest) returns (PendingOrderHistoryReply);
// Order history
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "from": "2022-01-01T00:00:00", 
//  "to": "2022-09-01T00:00:00", 
//  "ordersPerPage": "10", 
//  "pageNumber": "0", 
//  "requestAgain": "False", 
//  "sort": "OpenTime", 
//  "ascending": "True", 
//  "ignoreDepositWithdraw": "False" 
// }
  rpc OrderHistoryPagination (OrderHistoryPaginationRequest) returns (OrderHistoryPaginationReply);
// List of avaliable symbols with parameters
// [Example] 
// { 
//  "id": "" 
// }
  rpc Symbols (SymbolsRequest) returns (SymbolsReply);
// List of avaliable symbols
// [Example] 
// { 
//  "id": "" 
// }
  rpc SymbolList (SymbolListRequest) returns (SymbolListReply);
// Lot of informationabout about acocount. Can stuck swagger because of long json. You can use filter to reduce data.
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "msNotOlder": "0" 
// }
  rpc GetQuote (GetQuoteRequest) returns (GetQuoteReply);
// Latest quote for the specified symbol
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "msNotOlder": "0" 
// }
  rpc GetQuoteMany (GetQuoteManyRequest) returns (GetQuoteManyReply);
// Market Watch for the specified symbols
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc MarketWatchMany (MarketWatchManyRequest) returns (MarketWatchManyReply);
// Full infromation about symbol and his group
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
  rpc SymbolParams (SymbolParamsRequest) returns (SymbolParamsReply);
// Full infromation about symbol and his group for several symbols
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "limit": "10000" 
// }
  rpc SymbolParamsMany (SymbolParamsManyRequest) returns (SymbolParamsManyReply);
// Quote and trade sessions(open and close time) for the symbol. Returns 2 arrays. One for quotes and one for trades. Each array contains 7 elements for each day of weeks starting from Sunday.
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
rpc SymbolSessionsEx (SymbolSessionsExRequest) returns (SymbolSessionsExReply);
// Quote and trade sessions(open and close time) for the symbol. Returns 2 arrays. One for quotes and one for trades. Each array contains 7 elements for each day of weeks starting from Sunday.
// <br> [Example] <br>
// { <br>
//  "id": "demo-token-mt5" <br>
// }
rpc SymbolSessionsExMany (SymbolSessionsExManyRequest) returns (SymbolSessionsExManyReply);
// Server timezone.
// [Example] 
// { 
//  "id": "" 
// }
  rpc ServerTimezone (ServerTimezoneRequest) returns (ServerTimezoneReply);
// Check market open or not for specified symbol.
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
  rpc IsTradeSession (IsTradeSessionRequest) returns (IsTradeSessionReply);
// Check market open or not for specified symbol.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc IsTradeSessionMany (IsTradeSessionManyRequest) returns (IsTradeSessionManyReply);
// Check market open or not for specified symbol.
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
  rpc IsQuoteSession (IsQuoteSessionRequest) returns (IsQuoteSessionReply);
// Check market open or not for specified symbol.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc IsQuoteSessionMany (IsQuoteSessionManyRequest) returns (IsQuoteSessionManyReply);
// Tick value.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc GetTickValueMany (GetTickValueManyRequest) returns (GetTickValueManyReply);
// Tick value with size.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
rpc TickValueWithSize (TickValueWithSizeRequest) returns (TickValueWithSizeReply);

// Cluster servers details
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
//  rpc ClusterDetails (ClusterDetailsRequest) returns (ClusterDetailsReply);

  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordReply);
// Mail inbox
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc Mails (MailsRequest) returns (MailsReply);
// Required margin
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "lots": "1", 
//  "type": "DealBuy", 
//  "price": "0" 
// }
  rpc RequiredMargin (RequiredMarginRequest) returns (RequiredMarginReply);
}

service QuoteHistory {
// Price history for 30 days
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "year": "2022", 
//  "month": "6", 
//  "day": "1", 
//  "timeFrame": "240" 
// }
  rpc PriceHistoryMonth (PriceHistoryMonthRequest) returns (PriceHistoryMonthReply);
// OHLC for 30 days for several symbols
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "year": "2022", 
//  "month": "6", 
//  "day": "1", 
//  "timeFrame": "240" 
// }
rpc PriceHistoryMonthMany (PriceHistoryMonthManyRequest) returns (PriceHistoryMonthManyReply);


// Price history for today
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "timeFrame": "240" 
// }
  rpc PriceHistoryToday (PriceHistoryTodayRequest) returns (PriceHistoryTodayReply);
// Price history for today for several symbols
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "timeFrame": "240" 
// }
rpc PriceHistoryTodayMany (PriceHistoryTodayManyRequest) returns (PriceHistoryTodayManyReply);

// Price history for 30 days
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "from": "2022-01-01T00:00:00", 
//  "to": "2022-03-01T00:00:00", 
//  "timeFrame": "240" 
// }
  rpc PriceHistory (PriceHistoryRequest) returns (PriceHistoryReply);
  // Price history for several symbols
// <br> [Example] <br>
// { <br>
//  "id": "demo-token-mt5", <br>
//  "from": "2024-01-01T00:00:00", <br>
//  "to": "2024-03-01T00:00:00", <br>
//  "timeFrame": "240" <br>
// }
  rpc PriceHistoryMany (PriceHistoryManyRequest) returns (PriceHistoryManyReply);
// Price history for range
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "from": "2022-11-01T00:00:00", 
//  "to": "2022-11-02T00:00:00", 
//  "timeFrame": "60" 
// }
  rpc PriceHistoryHighLow (PriceHistoryHighLowRequest) returns (PriceHistoryHighLowReply);
  // Request quote history from specified date for several bars back to the past
// <br> [Example] <br>
// { <br>
//  "id": "demo-token-mt5", <br>
//  "symbol": "EURUSD", <br>
//  "to": "2022-03-01T00:00:00", <br>
//  "numBars": "10", <br>
//  "timeFrame": "240" <br>
// }
  rpc PriceHistoryEx (PriceHistoryExRequest) returns (PriceHistoryExReply);
// Request quote history from specified date for several bars back to the past
// <br> [Example] <br>
// { <br>
//  "id": "demo-token-mt5", <br>
//  "to": "2022-03-01T00:00:00", <br>
//  "numBars": "10", <br>
//  "timeFrame": "240" <br>
// }
  rpc PriceHistoryExMany (PriceHistoryExManyRequest) returns (PriceHistoryExManyReply);
}

service Service {
// Simple test without parameters
  rpc Ping (PingRequest) returns (PingReply);
  rpc Health (HealthRequest) returns (HealthReply);
// Simple test without parameters
// [Example] 
// { 
//  "host": "", 
//  "port": "443" 
// }
  rpc PingHost (PingHostRequest) returns (PingHostReply);
// Simple test without parameters
// [Example] 
// { 
//  "host": "", 
//  "port": "" 
// }
  rpc PingHostMany (PingHostManyRequest) returns (PingHostManyReply);
// Memory snapshot
  rpc MemorySnapshot (MemorySnapshotRequest) returns (MemorySnapshotReply);
// Broker search by company name
// [Example] 
// { 
//  "company": "" 
// }
  rpc Search (SearchRequest) returns (SearchReply);
// Return all active with connection state
  rpc GetClients (GetClientsRequest) returns (GetClientsReply);
// Create demo account
// [Example] 
// { 
//  "host": "", 
//  "port": "" 
// }
  rpc GetDemo (GetDemoRequest) returns (GetDemoReply);
  // API version
  rpc Version (VersionRequest) returns (VersionReply);
}

service Subscriptions {
// Subscribe symbol for real time quotes and get results via /events socket connection
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "interval": "0" 
// }
  rpc Subscribe (SubscribeRequest) returns (SubscribeReply);
// Subscribe symbosl for real time quotes and get results via /events socket connection
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "interval": "0" 
// }
  rpc SubscribeMany (SubscribeManyRequest) returns (SubscribeManyReply);
// Unsubscribe symbol for real time quotes and get results via /events socket connection
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
  rpc UnSubscribe (UnSubscribeRequest) returns (UnSubscribeReply);
// UnSubscribe symbosls for real time quotes and get results via /events socket connection
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc UnSubscribeMany (UnSubscribeManyRequest) returns (UnSubscribeManyReply);
// Subscribe for order profit updates and get results via /events socket connection
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc SubscribeOrderProfit (SubscribeOrderProfitRequest) returns (SubscribeOrderProfitReply);
// Subscribe symbol for tick value updates
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "interval": "0" 
// }
  rpc SubscribeTickValue (SubscribeTickValueRequest) returns (SubscribeTickValueReply);
// Subscribe symbol for tick value updates
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc SubscribeOrderUpdate (SubscribeOrderUpdateRequest) returns (SubscribeOrderUpdateReply);
// Subscribe market watch updates for /Events socket
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc SubscribeMarketWatch (SubscribeMarketWatchRequest) returns (SubscribeMarketWatchReply);
// Subscribe symbol for tick value updates
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "interval": "1000" 
// }
  rpc SubscribeOpenedOrdersTickets (SubscribeOpenedOrdersTicketsRequest) returns (SubscribeOpenedOrdersTicketsReply);
}

service TickHistory {
// Request tick history from specified time to present time. Please get result with OnTickHistory websocket.
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "startYear": "2023", 
//  "startMonth": "11", 
//  "startDay": "5" 
// }
  rpc TickHistoryRequest (TickHistoryRequestRequest) returns (TickHistoryRequestReply);
// Stop tick history request for some symbol
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD" 
// }
  rpc TickHistoryStop (TickHistoryStopRequest) returns (TickHistoryStopReply);

  rpc OnTickHistory (OnTickHistoryRequest) returns (stream OnTickHistoryReply);
}

service Trading {
// Send market or pending order
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "symbol": "EURUSD", 
//  "operation": "Buy", 
//  "volume": "0,1", 
//  "price": "0", 
//  "slippage": "0", 
//  "stoploss": "0", 
//  "takeprofit": "0", 
//  "expertID": "0", 
//  "stopLimitPrice": "0", 
//  "expirationType": "Specified", 
//  "placedType": "Manually" 
// }
  rpc OrderSend (OrderSendRequest) returns (OrderSendReply);
// Modify market or pending order
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "ticket": "0", 
//  "stoploss": "0", 
//  "takeprofit": "0", 
//  "price": "0", 
//  "expirationType": "Specified" 
// }
  rpc OrderModify (OrderModifyRequest) returns (OrderModifyReply);
// Close market or pending order
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "ticket": "0", 
//  "lots": "0", 
//  "price": "0", 
//  "slippage": "0" 
// }
  rpc OrderClose (OrderCloseRequest) returns (OrderCloseReply);
}

service Streams {
// Use this endpoint to get all events(OnQuote, OnOrderUpdate, etc..) via one web socket cobnnection.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc Events (EventsRequest) returns (stream EventsReply);
// All trading activity on accont.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnOrderUpdate (OnOrderUpdateRequest) returns (stream OnOrderUpdateReply);
// Real time quotes.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnQuote (OnQuoteRequest) returns (stream OnQuoteReply);
// Real time quotes.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnTickValue (OnTickValueRequest) returns (stream OnTickValueReply);
// Orders profits updates.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnOrderProfit (OnOrderProfitRequest) returns (stream OnOrderProfitReply);
// Market watch updates.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnMarketWatch (OnMarketWatchRequest) returns (stream OnMarketWatchReply);
// Tick history.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnTickHistory (OnTickHistoryRequest) returns (stream OnTickHistoryReply);
// Tick history.
// [Example] 
// { 
//  "id": "demo-token-mt5" 
// }
  rpc OnMail (OnMailRequest) returns (stream OnMailReply);
// Sends opened order tickets each 'interval' milliseconds
// [Example] 
// { 
//  "id": "demo-token-mt5", 
//  "interval": "1000" 
// }
  rpc OnOpenedOrdersTickets (OnOpenedOrdersTicketsRequest) returns (stream OnOpenedOrdersTicketsReply);
}


message Error
{
  ErrorCode code = 1;
  string message = 2;
  string stackTrace = 3;
}

// [Example]
// {
//  "user": "21455",
//  "password": "1nJeS+Ae",
//  "host": "95.217.147.61",
//  "port": "443"
// }
message ConnectRequest {
  // Account number. [Required]
   uint64 user = 1;
  // Password. [Required]
   string password = 2;
  // Host - ip adddress or dns name. [Required]
   string host = 3;
  // Port. [Required]
   int32 port = 4;
  // Token returned by 'Connect' method
   optional string id = 5;
   // Optional connect timeout in seconds. Default is 30 seconds.
   optional int32 connectTimeoutSeconds = 6;
}

message ConnectReply {
  string result = 1;
  Error error = 2;
}

// [Example] 
// { 
//  "user": "213827411", 
//  "password": "_rVx1tMn", 
//  "server": "OctaFX-Demo", 
// }
message ConnectExRequest {
  // Account number. [Required]
   uint64 user = 1;
  // Password. [Required]
   string password = 2;
  // MT5 server name from MT5 Terminal. [Required]
   string server = 3;
  // Token returned by 'Connect' method
   optional string id = 5;
   // Optional connect timeout in seconds. Default is 30 seconds.
   optional int32 connectTimeoutSeconds = 6;
}

message ConnectExReply {
  string result = 1;
  Error error = 2;
}

message VersionRequest {
}

message VersionReply {
  string result = 1;
  Error error = 2;
}

// [Example]
// {
//  "id": "demo-token-mt5",
//  "symbol": "EURUSD",
//  "to": "2022-03-01T00:00:00",
//  "numBars": "10",
//  "timeFrame": "240"
// }
message PriceHistoryExRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // Symbol [Required]
   string symbol = 2;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 3;
   int32 numBars = 4;
   int32 timeFrame = 5;
}

message PriceHistoryExReply {
  repeated Bar result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5",
//  "to": "2022-03-01T00:00:00",
//  "numBars": "10",
//  "timeFrame": "240"
// }
message PriceHistoryExManyRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // Symbol [Required]
  repeated string symbol = 2;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 3;
   int32 numBars = 4;
   int32 timeFrame = 5;
}

message PriceHistoryExManyReply {
  repeated BarsForSymbol result = 1;
  Error error = 2;
}

message PriceHistoryMonthManyReply {
  repeated QuoteHistoryEventArgs result = 1;
  Error error = 2;
}


// Quote history event args.
message QuoteHistoryEventArgs {
// Instrument.
  string Symbol = 1;
// History bars.
  repeated Bar Bars = 2;
}

// [Example]
// {
//  "id": "demo-token-mt5",
//  "from": "2024-01-01T00:00:00",
//  "to": "2024-03-01T00:00:00",
//  "timeFrame": "240"
// }
message PriceHistoryManyRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // Symbol [Required]
  repeated string symbol = 2;
  // 'From date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 3;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string to = 4;
   int32 timeFrame = 5;
}

message BarsForSymbol {
  string Symbol = 1;
  repeated Bar Bars = 2;
  string Exception = 3;
}

message PriceHistoryManyReply {
  repeated BarsForSymbol result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": ""
// }
message SymbolListRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

message SymbolListReply {
  repeated string result = 1;
  Error error = 2;
}


// Specifies the type of proxy servers that an instance of the ProxySocket class can use.
enum ProxyTypes {
// No proxy server; the ProxySocket object behaves exactly like an ordinary Socket object.
  ProxyTypes_None = 0;
// A HTTPS (CONNECT) proxy server.
  ProxyTypes_Https = 1;
// A SOCKS4[A] proxy server.
  ProxyTypes_Socks4 = 2;
// A SOCKS5 proxy server.
  ProxyTypes_Socks5 = 3;
}

// [Example]
// {
//  "user": "21455",
//  "password": "1nJeS+Ae",
//  "host": "95.217.147.61",
//  "port": "443",
//  "proxyUser": "ProxyUser123",
//  "proxyPassword": "qwerty123",
//  "proxyHost": "65.108.126.217",
//  "proxyPort": "1080",
//  "proxyType": "Socks5"
// }
message ConnectProxyRequest {
  // Account number. [Required]
   uint64 user = 1;
  // Password. [Required]
   string password = 2;
  // Host - ip adddress or dns name. [Required]
   string host = 3;
  // Port. [Required]
   int32 port = 4;
  // Proxy user [Required]
   string proxyUser = 5;
  // Proxy password [Required]
   string proxyPassword = 6;
  // Proxy server ip adddress [Required]
   string proxyHost = 7;
  // Proxy port [Required]
   int32 proxyPort = 8;
  // Proxy type. Put 'Socks5' for default parameters [Required]
   ProxyTypes proxyType = 9;
  // Token returned by 'Connect' method
   optional string id = 10;
}

message ConnectProxyReply {
  string result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5"
// }
message CheckConnectRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

message CheckConnectReply {
  string result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": ""
// }
message DisconnectRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

message DisconnectReply {
  string result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5"
// }
message AccountRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

// Account details
message AccountRec {
  uint64 Login = 1;
  string Type = 2;
  string UserName = 3;
  int32 TradeFlags = 4;
  string Country = 5;
  string City = 6;
  string State = 7;
  string ZipCode = 8;
  string UserAddress = 9;
  string Phone = 10;
  string Email = 11;
  double Balance = 12;
  double Credit = 13;
  double Blocked = 14;
  int32 Leverage = 15;
}

message AccountReply {
  AccountRec result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5"
// }
message AccountSummaryRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

// Account summary trading information
message AccountSummary {
// Balance
  double Balance = 1;
// Credit
  double Credit = 2;
// Profit
  double Profit = 3;
// Equity
  double Equity = 4;
// Used margin
  double Margin = 5;
// Free margin
  double FreeMargin = 6;
// Margin percent
  double MarginLevel = 7;
// Leverage
  double Leverage = 8;
// Currency
  string Currency = 9;
// Netting or hedging.
  AccMethod Method = 10;
  // Demo or real
  string Type = 11;
  // Investor mode (without trading)
  bool IsInvestor = 12;
}

// Netting or Hedging
enum AccMethod {
  AccMethod_Default = 0;
  AccMethod_Netting = 1;
  AccMethod_Hedging = 2;
}

message AccountSummaryReply {
  AccountSummary result = 1;
  Error error = 2;
}


enum OrderSort {
  OrderSort_OpenTime = 0;
  OrderSort_CloseTime = 1;
}

// [Example]
// {
//  "id": "",
//  "sort": "OpenTime",
//  "ascending": "True"
// }
message OpenedOrdersRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // Sort by open time or close time
   optional OrderSort sort = 2;
  // Ascending sort
   optional bool ascending = 3;
}

// Pending, market or history order
message Order {
  uint64 CloseVolume = 1;
  uint64 Volume = 2;
  ExpirationType ExpirationType = 3;
  google.protobuf.Timestamp ExpirationTime = 4;
  FillPolicy FillPolicy = 5;
  int64 OpenTimestampUTC = 6;
  int64 CloseTimestampUTC = 7;
  int64 Ticket = 8;
  double Profit = 9;
  double Swap = 10;
  double Commission = 11;
  double Fee = 12;
  double ClosePrice = 13;
  google.protobuf.Timestamp CloseTime = 14;
  double CloseLots = 15;
  string CloseComment = 16;
  double OpenPrice = 17;
  google.protobuf.Timestamp OpenTime = 18;
  double Lots = 19;
  double ContractSize = 20;
  int64 ExpertId = 21;
  PlacedType PlacedType = 22;
  OrderType OrderType = 23;
  DealType DealType = 24;
  string Symbol = 25;
  string Comment = 26;
  OrderState State = 27;
  double StopLoss = 28;
  double TakeProfit = 29;
  int32 RequestId = 30;
  int32 Digits = 31;
  double ProfitRate = 32;
  double StopLimitPrice = 33;
  DealInternal DealInternalIn = 34;
  DealInternal DealInternalOut = 35;
  OrderInternal OrderInternal = 36;
  repeated DealInternal PartialCloseDeals = 37;
}

// Expiration type
enum ExpirationType {
  ExpirationType_GTC = 0;
  ExpirationType_Today = 1;
  ExpirationType_Specified = 2;
  ExpirationType_SpecifiedDay = 3;
}

// Fill policy
enum FillPolicy {
  FillPolicy_FillOrKill = 0;
  FillPolicy_ImmediateOrCancel = 1;
  FillPolicy_FlashFill = 2;
  FillPolicy_Any = 3;
}

// Placed manually or ByExpert
enum PlacedType {
  PlacedType_Manually = 0;
  PlacedType_Mobile = 16;
  PlacedType_Web = 17;
  PlacedType_ByExpert = 1;
  PlacedType_OnSL = 3;
  PlacedType_OnTP = 4;
  PlacedType_OnStopOut = 5;
  PlacedType_OnRollover = 6;
  PlacedType_OnVmargin = 8;
  PlacedType_OnSplit = 18;
  PlacedType_ByDealer = 2;
  PlacedType_Gateway = 9;
  PlacedType_Signal = 10;
  PlacedType_Settlement = 11;
  PlacedType_Transfer = 12;
  PlacedType_Sync = 13;
  PlacedType_ExternalService = 14;
  PlacedType_Migration = 15;
  PlacedType_Default = 20;
}

// Order type
enum OrderType {
  OrderType_Buy = 0;
  OrderType_Sell = 1;
  OrderType_BuyLimit = 2;
  OrderType_SellLimit = 3;
  OrderType_BuyStop = 4;
  OrderType_SellStop = 5;
  OrderType_BuyStopLimit = 6;
  OrderType_SellStopLimit = 7;
  OrderType_CloseBy = 8;
  OrderType_Balance = 100;
  OrderType_Credit = 101;
}

// Deal type
enum DealType {
  DealType_DealBuy = 0;
  DealType_DealSell = 1;
  DealType_Balance = 2;
  DealType_Credit = 3;
  DealType_Charge = 4;
  DealType_Correction = 5;
  DealType_Bonus = 6;
  DealType_Commission = 7;
  DealType_DailyCommission = 8;
  DealType_MonthlyCommission = 9;
  DealType_DailyAgentCommission = 10;
  DealType_MonthlyAgentCommission = 11;
  DealType_InterestRate = 12;
  DealType_CanceledBuy = 13;
  DealType_CanceledSell = 14;
}

// Order state
enum OrderState {
  OrderState_Started = 0;
  OrderState_Placed = 1;
  OrderState_Cancelled = 2;
  OrderState_Partial = 3;
  OrderState_Filled = 4;
  OrderState_Rejected = 5;
  OrderState_Expired = 6;
  OrderState_RequestAdding = 7;
  OrderState_RequestModifying = 8;
  OrderState_RequestCancelling = 9;
}

// Internal details for the deal
message DealInternal {
// Open time
  google.protobuf.Timestamp OpenTimeAsDateTime = 1;
// Lots
  double Lots = 2;
// Deal ticket
  int64 TicketNumber = 3;
// Text id
  string Id = 4;
// Account login
  uint64 Login = 5;
// History time (as FileTime format)
  int64 HistoryTime = 6;
// Order ticket
  int64 OrderTicket = 7;
// Open time
  int64 OpenTime = 8;
// Symbol currency
  string Symbol = 9;
// Deal type
  DealType Type = 10;
// Deal direction
  Direction Direction = 11;
// Open price
  double OpenPrice = 12;
// Price
  double Price = 13;
// Stop loss
  double StopLoss = 14;
// Take profit
  double TakeProfit = 15;
// Volume
  uint64 Volume = 16;
// Profit (money digits)
  double Profit = 17;
// Profit rate
  double ProfitRate = 18;
// Volume rate
  double VolumeRate = 19;
// Commission (money digits)
  double Commission = 20;
  double Fee = 21;
// Swap
  double Swap = 22;
// Expert id
  int64 ExpertId = 23;
// Position ticket
  int64 PositionTicket = 24;
// Text comment
  string Comment = 25;
// Lots
  double ContractSize = 26;
// Significant digits
  int32 Digits = 27;
// Money significant digits
  int32 MoneyDigits = 28;
// Free profit
  double FreeProfit = 29;
// Trail rounder
  double TrailRounder = 30;
// Open time (ms)
  int64 OpenTimeMs = 31;
// Placed type
  PlacedType PlacedType = 32;
}

// Direction of the deal
enum Direction {
  Direction_In = 0;
  Direction_Out = 1;
  Direction_InOut = 2;
  Direction_OutBy = 3;
}

