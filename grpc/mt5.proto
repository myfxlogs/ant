  int64 Ticket = 1;
  google.protobuf.Timestamp ExecutionTimeAsDateTime = 2;
// Lots
  double Lots = 3;
// Request lots
  double RequestLots = 4;
  google.protobuf.Timestamp OpenTimeMsAsDateTime = 5;
// Ticket number
  int64 TicketNumber = 6;
// Text id
  string Id = 7;
// Account login
  uint64 Login = 8;
// Symbol currency
  string Symbol = 9;
// History time	(as FileTime format)
  int64 HistoryTime = 10;
// Open time
  int64 OpenTime = 11;
// Expiration time
  int64 ExpirationTime = 12;
// Execution time
  int64 ExecutionTime = 13;
// Order type
  OrderType Type = 14;
// Fill policy
  FillPolicy FillPolicy = 15;
// Expiration type
  ExpirationType ExpirationType = 16;
// Placed type
  PlacedType PlacedType = 17;
// Open price
  double OpenPrice = 18;
// StopLimit price
  double StopLimitPrice = 19;
// Price
  double Price = 20;
// Stop loss
  double StopLoss = 21;
// Take profit
  double TakeProfit = 22;
// Cover volume
  uint64 Volume = 23;
// Request volume
  uint64 RequestVolume = 24;
// Order state
  OrderState State = 25;
// Expert id
  int64 ExpertId = 26;
// Associative deal ticket
  int64 DealTicket = 27;
// Comment text
  string Comment = 28;
// Lots
  double ContractSize = 29;
// Significant digits
  int32 Digits = 30;
// Symbols base significant digits
  int32 BaseDigits = 31;
// Profit rate
  double ProfitRate = 32;
// Open time (ms)
  int64 OpenTimeMs = 33;
}

