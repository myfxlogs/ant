// [Example]
// {
//  "id": "demo-token-mt5",
//  "from": "2022-01-01T00:00:00",
//  "to": "2022-09-01T00:00:00",
//  "sort": "OpenTime",
//  "ascending": "True"
// }
message OrderHistoryRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // 'From date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 2;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string to = 3;
  // Sort by open time or close time
   optional OrderSort sort = 4;
  // Ascending sort
   optional bool ascending = 5;
  // Fields that need to return
  optional string filter = 6;
}

message OrderHistoryReply {
  repeated Order result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5",
//  "from": "2023-09-01T00:00:00",
//  "to": "2023-10-01T00:00:00",
//  "ascending": "True"
// }
message PendingOrderHistoryRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // 'From date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 2;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string to = 3;
  // Ascending sort
   optional bool ascending = 4;
}

message PendingOrderHistoryReply {
  repeated OrderInternal result = 1;
  Error error = 2;
}


// [Example]
// {
//  "id": "demo-token-mt5",
//  "from": "2022-01-01T00:00:00",
//  "to": "2022-09-01T00:00:00",
//  "ordersPerPage": "10",
//  "pageNumber": "0",
//  "requestAgain": "False",
//  "sort": "OpenTime",
//  "ascending": "True",
//  "ignoreDepositWithdraw": "False"
// }
message OrderHistoryPaginationRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
  // 'From date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string from = 2;
  // 'To date' in format: yyyy-MM-ddTHH:mm:ss [Required]
   string to = 3;
  // Orders per page [Required]
   int32 ordersPerPage = 4;
  // Page number [Required]
   int32 pageNumber = 5;
  // If need to force refresh orders from mt5 server
   optional bool requestAgain = 6;
  // Sort by open time or close time
   optional OrderSort sort = 7;
  // Ascending sort
   optional bool ascending = 8;
  // List of tickets that need to return. If not specified - returns all tickets.
  repeated int64 tickets = 9;
  // Do not return deposit and withdraw operations
   optional bool ignoreDepositWithdraw = 10;
}

// OrderHistoryPagination
message PaginationReply {
// Total pages count
  int32 PagesCount = 1;
// Current page
  int32 PageNumber = 2;
// Orders
  repeated Order Orders = 3;
}

message OrderHistoryPaginationReply {
  PaginationReply result = 1;
  Error error = 2;
}


