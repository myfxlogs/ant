   string id = 1;
  // Symbol [Required]
   string symbol = 2;
  // If last quote arrived less than msOlderMs milliseconds ago function returns last quote, overwise - wait for new quote. If zero - always returns last quote.
   optional int32 msNotOlder = 3;
}

