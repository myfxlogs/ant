// Symbol details
message SymbolInfo {
// Update time
  int64 UpdateTime = 1;
// Symbol currency
  string Currency = 2;
// Symbol ISIN
  string ISIN = 3;
// Description
  string Description = 4;
  string Basis = 5;
// Reference to site
  string RefToSite = 6;
  int32 Custom = 7;
// Currency for profit
  string ProfitCurrency = 8;
// Currency for margin
  string MarginCurrency = 9;
  int32 Precision = 10;
// Background color
  int32 BkgndColor = 11;
// Significant digits
  int32 Digits = 12;
// Symbol points
  double Points = 13;
// Symbol limit points
  double LimitPoints = 14;
// Symbol id
  int32 Id = 15;
// Depth of market
  int32 DepthOfMarket = 16;
// Spread
  int32 Spread = 17;
// Tick value
  double TickValue = 18;
// Tick size
  double TickSize = 19;
// Contract size
  double ContractSize = 20;
// Good till canceled mode
  GTCMode GTCMode = 21;
// Calculation mode
  CalculationMode CalcMode = 22;
// Settlement price
  double SettlementPrice = 23;
// Lower limit
  double LowerLimit = 24;
// Upper limit
  double UpperLimit = 25;
// Face value
  double FaceValue = 26;
// Accuired interest
  double AccruedInterest = 27;
// First trade time
  int64 FirstTradeTime = 28;
// Last trade time
  int64 LastTradeTime = 29;
}

