// {
//  "id": "demo-token-mt5"
// }
message OnOrderUpdateRequest {
  // Token returned by 'Connect' method [Required]
   string id = 1;
}

// Order update event details
message OrderUpdateSummary {
// Order and update action
  OrderUpdate Update = 1;
// Balance
  double Balance = 2;
// Equity
  double Equity = 3;
// Used margin
  double Margin = 4;
// Free margin
  double FreeMargin = 5;
// Account profit
  double Profit = 6;
// Margin level
  double MarginLevel = 7;
// Account number
  uint64 User = 8;
// Opened orders
  repeated Order OpenedOrders = 9;
}

// Details of order update
message OrderUpdate {
  TransactionInfo Trans = 1;
  OrderInternal OrderInternal = 2;
  DealInternal Deal = 3;
  DealInternal OppositeDeal = 4;
  Order Order = 5;
  UpdateType Type = 6;
  int32 CloseByTicket = 7;
}

// Transaction information
message TransactionInfo {
// Transaction ticket
  int32 UpdateId = 1;
// Transaction action
  int32 Action = 2;
// Deal ticket
  int64 TicketNumber = 3;
  string Currency = 4;
// Symbol currency
  int32 Id = 5;
// Transaction id
  OrderType s58 = 6;
// Order type
  OrderState OrderState = 7;
// Order state
  ExpirationType ExpirationType = 8;
// Order placed type
  int64 ExpirationTime = 9;
// Deal type
  double OpenPrice = 10;
// Deal placed type
  double OrderPrice = 11;
// Expiration type
  double StopLoss = 12;
// Expiration time
  double TakeProfit = 13;
// Open price
  uint64 Volume = 14;
}

enum UpdateType {
  UpdateType_Unknown = 0;
  UpdateType_PendingClose = 1;
  UpdateType_MarketOpen = 2;
  UpdateType_PendingOpen = 3;
  UpdateType_MarketClose = 4;
  UpdateType_PartialClose = 5;
  UpdateType_Started = 6;
  UpdateType_Filled = 7;
  UpdateType_Cancelling = 8;
  UpdateType_MarketModify = 9;
  UpdateType_PendingModify = 10;
  UpdateType_OnStopLoss = 11;
  UpdateType_OnTakeProfit = 12;
  UpdateType_OnStopOut = 13;
  UpdateType_Balance = 14;
  UpdateType_Expired = 15;
  UpdateType_Rejected = 16;
  UpdateType_MarketCloseBy = 17;
}

message OnOrderUpdateReply {
  OrderUpdateSummary result = 1;
  Error error = 2;
}


