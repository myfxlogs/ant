// Trading instrument.
  string Symbol = 1;
// Bid.
  double Bid = 2;
// Ask.
  double Ask = 3;
// Server time.
  google.protobuf.Timestamp Time = 4;
// Last deal price.
  double Last = 5;
// Volume
  uint64 Volume = 6;
}

message GetQuoteReply {
  Quote result = 1;
  Error error = 2;
}


