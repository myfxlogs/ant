services:
  frontend:
    container_name: ant-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MENU_MODE: ${VITE_MENU_MODE:-full}
        NODE_BUILD_IMAGE: ${NODE_BUILD_IMAGE:-docker.io/library/node:22-alpine}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_STREAM_URL: ${VITE_STREAM_URL:-}
    image: ant-prod-frontend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "${ANT_FRONTEND_PORT:-8022}:8080"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      backend:
        condition: service_started
      strategy-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ant-network

  backend:
    container_name: ant-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ant-prod-backend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-ant}
      - DB_USER=${DB_USER:-ant}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env (32+ chars)}
      - NATS_URL=nats://nats:4222
      - STRATEGY_SERVICE_URL=http://strategy-service:8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TZ=Asia/Shanghai
      - GIN_MODE=release
      - CH_HOST=clickhouse
      - CH_PORT=9000
      - CH_USER=${CH_USER:-default}
      - CH_PASSWORD=${CH_PASSWORD:-clickhouse}
      - CH_DATABASE=${CH_DATABASE:-ant}
      - FMP_API_KEY=${FMP_API_KEY:-}
      - ANTRADER_SEED_DEFAULT_STRATEGY_TEMPLATES=true
      - ANTRADER_SCHEDULE_EVENT_DRIVEN_ENABLED=true
      - ANTRADER_SCHEDULE_WATCHDOG_INTERVAL=30s
      - ANT_MASTER_KEY=${ANT_MASTER_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ant-network

  strategy-service:
    container_name: ant-strategy-service
    build:
      context: ./strategy-service
      dockerfile: Dockerfile
    image: ant-prod-strategy-service
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    privileged: true
    cap_add:
      - NET_ADMIN
    security_opt:
      - label=disable
    networks:
      - ant-network

  postgres:
    container_name: ant-postgres
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - POSTGRES_USER=${DB_USER:-ant}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      - POSTGRES_DB=${DB_NAME:-ant}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ant} -d ${DB_NAME:-ant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ant-network

  clickhouse:
    container_name: ant-clickhouse
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 1024M
    environment:
      - CLICKHOUSE_DB=${CH_DATABASE:-ant}
      - CLICKHOUSE_USER=${CH_USER:-default}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD:-clickhouse}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - MAX_MEMORY_USAGE=3000000000
    ports:
      - "${CH_HTTP_PORT:-8123}:8123"
      - "${CH_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CH_USER:-default} --password ${CH_PASSWORD:-clickhouse} --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ant-network

  redis:
    container_name: ant-redis
    image: redis:8-alpine
    ports:
      - "6379:6379"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ant-network

  nats:
    container_name: ant-nats
    image: nats:2.10-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    command: ["-c", "/etc/nats/nats.conf", "-js"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ant-network

networks:
  ant-network:
    driver: bridge

volumes:
  postgres_data:
    name: ant_postgres_data
  redis_data:
    name: ant_redis_data
  clickhouse_data:
    name: ant_clickhouse_data
  nats_data:
    name: ant_nats_data